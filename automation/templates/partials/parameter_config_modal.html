<!-- parameter_config_modal.html -->
{% load custom_filters %}

<!-- Parameter Configuration Modal -->
<div class="modal fade" id="parameterConfigModal" tabindex="-1" aria-labelledby="parameterConfigModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="parameterConfigModalLabel">Configure Parameter</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="parameter-config-form">
                    {% csrf_token %}
                    
                    <!-- Parameter Selection -->
                    <div class="mb-3">
                        <label for="parameter_id" class="form-label">Select Parameter</label>
                        <select id="parameter_id" name="parameter_id" class="form-control">
                            <option value="">-- Select Parameter --</option>
                        </select>
                    </div>

                    <!-- Operator and Value Manipulation -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="operator" class="form-label">Operator</label>
                            <select id="operator" name="operator" class="form-control">
                                <option value="+">+</option>
                                <option value="-">-</option>
                                <option value="*">*</option>
                                <option value="/">/</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="value_manipulation" class="form-label">Value Manipulation</label>
                            <select id="value_manipulation" name="value_manipulation" class="form-control" onchange="toggleValueManipulationFields()">
                                <option value="no-change">No Change</option>
                                <option value="fixed">Fixed Value</option>
                                <option value="random">Random Value</option>
                                <option value="enum">Enum</option>
                                <option value="parameters">Parameters</option>
                            </select>
                        </div>
                    </div>

                    <!-- Value Options Section -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h6 class="mb-0">Value Options</h6>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="value_options" class="form-label">Value Options</label>
                                <input type="text" id="value_options" name="value_options" class="form-control" placeholder="Enter value options">
                            </div>

                            <!-- Fixed Value Fields -->
                            <div id="fixed-value-fields" style="display: none;">
                                <div class="mb-3">
                                    <label for="fixed_value" class="form-label">Fixed Value</label>
                                    <input type="number" id="fixed_value" name="fixed_value" class="form-control" step="any">
                                </div>
                            </div>

                            <!-- Random Value Fields -->
                            <div id="random-value-fields" style="display: none;">
                                <div class="row">
                                    <div class="col-md-4">
                                        <label for="min_value" class="form-label">Min Value</label>
                                        <input type="number" id="min_value" name="min_value" class="form-control" step="any">
                                    </div>
                                    <div class="col-md-4">
                                        <label for="max_value" class="form-label">Max Value</label>
                                        <input type="number" id="max_value" name="max_value" class="form-control" step="any">
                                    </div>
                                    <div class="col-md-4">
                                        <label for="resolution_value" class="form-label">Resolution Value</label>
                                        <input type="number" id="resolution_value" name="resolution_value" class="form-control" step="any">
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-md-6">
                                        <label for="resolution" class="form-label">Resolution Type</label>
                                        <select id="resolution" name="resolution" class="form-control">
                                            <option value="percentage">Percentage</option>
                                            <option value="fixed">Fixed Time</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Enum Value Fields -->
                            <div id="enum-value-fields" style="display: none;">
                                <div class="mb-3">
                                    <label for="enum_value" class="form-label">Enum Values (comma-separated)</label>
                                    <input type="text" id="enum_value" name="enum_value" class="form-control">
                                </div>
                            </div>

                            <!-- Table Parameters -->
                            <div id="table-parameters-fields" style="display: none;">
                                <div class="mb-3">
                                    <label for="table_parameters" class="form-label">Table Parameters</label>
                                    <select id="table_parameters" name="table_parameters" class="form-control">
                                        <option value="">-- Select Table Parameter --</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Value Tolerance Section -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h6 class="mb-0">Value Tolerance</h6>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4">
                                    <label for="value_tolerance" class="form-label">Value Tolerance</label>
                                    <select id="value_tolerance" name="value_tolerance" class="form-control">
                                        <option value="">None</option>
                                        <option value="percentage">Percentage</option>
                                        <option value="fixed">Fixed Value</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="percentage" class="form-label">Percentage</label>
                                    <input type="number" id="percentage" name="percentage" class="form-control" step="0.01" min="0" max="100">
                                </div>
                                <div class="col-md-4">
                                    <label for="value_tolerance_value" class="form-label">Value Tolerance Value</label>
                                    <input type="number" id="value_tolerance_value" name="value_tolerance_value" class="form-control" step="any">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Time Tolerance Section -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h6 class="mb-0">Time Tolerance</h6>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4">
                                    <label for="time_tolerance" class="form-label">Time Tolerance</label>
                                    <select id="time_tolerance" name="time_tolerance" class="form-control">
                                        <option value="">None</option>
                                        <option value="reach-value">Time to Reach Value</option>
                                        <option value="stable-value">Period of Stable Value</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="time_to_reach_value" class="form-label">Time to Reach Value</label>
                                    <input type="number" id="time_to_reach_value" name="time_to_reach_value" class="form-control" step="0.001" min="0">
                                </div>
                                <div class="col-md-4">
                                    <label for="time_tolerance_value" class="form-label">Time Tolerance Value</label>
                                    <input type="number" id="time_tolerance_value" name="time_tolerance_value" class="form-control" step="0.001" min="0">
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveParameterConfig()">Save Configuration</button>
            </div>
        </div>
    </div>
</div>

<!-- Parameters List Display -->
<div id="configured-parameters-list" class="mt-3">
    <!-- This will be populated with configured parameters -->
</div>

<script>
// Store configured parameters
let configuredParameters = {};

// Toggle value manipulation fields
function toggleValueManipulationFields() {
    const valueManipulation = document.getElementById('value_manipulation').value;
    
    // Hide all fields first
    document.getElementById('fixed-value-fields').style.display = 'none';
    document.getElementById('random-value-fields').style.display = 'none';
    document.getElementById('enum-value-fields').style.display = 'none';
    document.getElementById('table-parameters-fields').style.display = 'none';
    
    // Show relevant fields
    switch(valueManipulation) {
        case 'fixed':
            document.getElementById('fixed-value-fields').style.display = 'block';
            break;
        case 'random':
            document.getElementById('random-value-fields').style.display = 'block';
            break;
        case 'enum':
            document.getElementById('enum-value-fields').style.display = 'block';
            break;
        case 'parameters':
            document.getElementById('table-parameters-fields').style.display = 'block';
            break;
    }
}

// Load parameters based on packet selection
function loadParametersForPacket(packetId) {
    // Clear existing parameters
    const paramSelect = document.getElementById('parameter_id');
    paramSelect.innerHTML = '<option value="">-- Select Parameter --</option>';
    
    if (packetId) {
        // TODO: Replace with actual AJAX call to load parameters
        // For now, use static parameters
        const parameters = [
            {id: 'param_1', name: 'Parameter 1'},
            {id: 'param_2', name: 'Parameter 2'},
            {id: 'param_3', name: 'Parameter 3'}
        ];
        
        parameters.forEach(param => {
            const option = document.createElement('option');
            option.value = param.id;
            option.textContent = param.name;
            paramSelect.appendChild(option);
        });
    }
}

// Save parameter configuration
function saveParameterConfig() {
    const formData = new FormData(document.getElementById('parameter-config-form'));
    const parameterId = formData.get('parameter_id');
    
    if (!parameterId) {
        alert('Please select a parameter');
        return;
    }
    
    // Create configuration object
    const config = {
        parameter_id: parameterId,
        operator: formData.get('operator'),
        value_manipulation: formData.get('value_manipulation'),
        value_options: formData.get('value_options'),
        fixed_value: formData.get('fixed_value'),
        min_value: formData.get('min_value'),
        max_value: formData.get('max_value'),
        resolution: formData.get('resolution'),
        resolution_value: formData.get('resolution_value'),
        enum_value: formData.get('enum_value'),
        table_parameters: formData.get('table_parameters'),
        value_tolerance: formData.get('value_tolerance'),
        percentage: formData.get('percentage'),
        value_tolerance_value: formData.get('value_tolerance_value'),
        time_tolerance: formData.get('time_tolerance'),
        time_to_reach_value: formData.get('time_to_reach_value'),
        time_tolerance_value: formData.get('time_tolerance_value')
    };
    
    // Store configuration
    configuredParameters[parameterId] = config;
    
    // Update display
    updateParametersDisplay();
    
    // Close modal
    const modal = bootstrap.Modal.getInstance(document.getElementById('parameterConfigModal'));
    modal.hide();
    
    // Reset form
    document.getElementById('parameter-config-form').reset();
}

// Update parameters display
function updateParametersDisplay() {
    const listContainer = document.getElementById('configured-parameters-list');
    listContainer.innerHTML = '';
    
    if (Object.keys(configuredParameters).length === 0) {
        listContainer.innerHTML = '<p class="text-muted">No parameters configured</p>';
        return;
    }
    
    const list = document.createElement('div');
    list.className = 'list-group';
    
    Object.entries(configuredParameters).forEach(([paramId, config]) => {
        const item = document.createElement('div');
        item.className = 'list-group-item d-flex justify-content-between align-items-center';
        
        const paramText = document.createElement('span');
        paramText.innerHTML = `
            <strong>${config.parameter_id}</strong> - 
            ${config.value_manipulation} 
            (${config.operator})
        `;
        
        const actions = document.createElement('div');
        actions.innerHTML = `
            <button class="btn btn-sm btn-info" onclick="editParameterConfig('${paramId}')">
                <i class="fa fa-edit"></i>
            </button>
            <button class="btn btn-sm btn-danger" onclick="removeParameterConfig('${paramId}')">
                <i class="fa fa-trash"></i>
            </button>
        `;
        
        item.appendChild(paramText);
        item.appendChild(actions);
        list.appendChild(item);
    });
    
    listContainer.appendChild(list);
}

// Edit parameter configuration
function editParameterConfig(parameterId) {
    const config = configuredParameters[parameterId];
    if (!config) return;
    
    // Populate form with existing values
    Object.entries(config).forEach(([key, value]) => {
        const field = document.getElementById(key);
        if (field) {
            field.value = value || '';
        }
    });
    
    // Show relevant fields
    toggleValueManipulationFields();
    
    // Open modal
    const modal = new bootstrap.Modal(document.getElementById('parameterConfigModal'));
    modal.show();
}

// Remove parameter configuration
function removeParameterConfig(parameterId) {
    if (confirm('Are you sure you want to remove this parameter configuration?')) {
        delete configuredParameters[parameterId];
        updateParametersDisplay();
    }
}

// Add this function to be called when packet is selected in main form
function onPacketSelected() {
    const packetId = document.getElementById('id_packet').value;
    loadParametersForPacket(packetId);
}
</script>
